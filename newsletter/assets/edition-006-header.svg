<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1b2b"/>
      <stop offset="0.6" stop-color="#12283f"/>
      <stop offset="1" stop-color="#0a1622"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f4d488"/>
      <stop offset="1" stop-color="#e8b64c"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.82" cy="0.28" r="0.5">
      <stop offset="0" stop-color="#e8b64c" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#e8b64c" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- faint circuit / heartland motif -->
  <g opacity="0.10" stroke="#5b7da0" stroke-width="2" fill="none">
    <path d="M0 540 H140 V500 H260 V560 H400"/>
    <path d="M1200 90 H1060 V140 H940"/>
    <circle cx="140" cy="540" r="6" fill="#5b7da0" stroke="none"/>
    <circle cx="940" cy="140" r="6" fill="#5b7da0" stroke="none"/>
  </g>

  <!-- top rule -->
  <rect x="80" y="86" width="70" height="5" fill="url(#gold)"/>
  <text x="162" y="98" fill="#f4d488" font-size="22" font-weight="700" letter-spacing="7">THE NO-CODE CAIO NEWSLETTER</text>

  <!-- countdown medallion -->
  <g transform="translate(1010,150)">
    <circle r="96" fill="#e8b64c" fill-opacity="0.08" stroke="url(#gold)" stroke-width="4"/>
    <text x="0" y="26" text-anchor="middle" fill="#f4d488" font-size="96" font-weight="800">6</text>
    <text x="0" y="60" text-anchor="middle" fill="#c8d3de" font-size="15" font-weight="700" letter-spacing="4">EDITIONS LEFT</text>
  </g>

  <!-- headline -->
  <text x="80" y="300" fill="#ffffff" font-size="76" font-weight="800" letter-spacing="-1">Eighty Hours of Work.</text>
  <text x="80" y="384" fill="#ffffff" font-size="76" font-weight="800" letter-spacing="-1">Ninety Minutes.</text>

  <!-- subhead -->
  <text x="80" y="446" fill="#c8d3de" font-size="27">Market pulse, one real use case, and a data concept anyone can understand.</text>

  <!-- countdown strip -->
  <rect x="0" y="548" width="1200" height="82" fill="#e8b64c"/>
  <text x="80" y="598" fill="#3a2b06" font-size="27" font-weight="700">Six editions left on LinkedIn. Then the No-Code CAIO moves home to agipodcast.ai</text>
</svg>
